[shieldcall-inbound]
exten => _.,1,NoOp(New Inbound Call from ${CALLERID(num)})
 same => n,Set(CURLOPT(httpheader)=Content-Type: application/json)
 same => n,Set(JSON_RESULT=${CURL(http://shieldcall-detection:8001/v1/detect,{"call_id":"${UNIQUEID}"\,"caller_number":"${CALLERID(num)}"\,"called_number":"${EXTEN}"})})
 same => n,NoOp(API Result: ${JSON_RESULT})
 same => n,GotoIf($["${STRREPLACE(JSON_RESULT,likely_ai,)}" != "${JSON_RESULT}"]?ai_path:human_path)
 same => n(human_path),Answer()
 same => n,Playback(demo-congrats)
 same => n,Hangup()
 same => n(ai_path),Answer()
 same => n,Playback(tt-monkeys)
 same => n,Hangup()
